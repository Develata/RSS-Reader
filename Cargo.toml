[workspace]
members = [
    "crates/rssr-app",
    "crates/rssr-application",
    "crates/rssr-domain",
    "crates/rssr-infra",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["Develata"]
repository = "https://example.invalid/RSS-Reader"

[workspace.dependencies]
anyhow = "1"
dioxus = { version = "0.6", default-features = false, features = ["minimal", "router"] }
dioxus-router = "0.6"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
