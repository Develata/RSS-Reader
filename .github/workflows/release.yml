name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Windows binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path target/release/rssr-app.exe -DestinationPath release-assets/rssr-app-windows-x86_64.zip
          Compress-Archive -Path target/release/rssr-cli.exe -DestinationPath release-assets/rssr-cli-windows-x86_64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Linux binaries
        run: |
          mkdir -p release-assets
          tar -C target/release -czf release-assets/rssr-app-linux-x86_64.tar.gz rssr-app
          tar -C target/release -czf release-assets/rssr-cli-linux-x86_64.tar.gz rssr-cli

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/*

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.3

      - name: Build web bundle
        run: dx bundle --platform web --package rssr-app --release --debug-symbols false --out-dir target/web-dist

      - name: Archive web bundle
        run: |
          mkdir -p release-assets
          tar -C target/web-dist -czf release-assets/rssr-app-web.tar.gz public

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-web
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
