name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
  DIOXUS_CLI_VERSION: 0.7.3

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
      ANDROID_API_LEVEL: 34
      ANDROID_RELEASE_READY: >-
        ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' &&
            secrets.ANDROID_KEYSTORE_PASSWORD != '' &&
            secrets.ANDROID_KEY_ALIAS != '' &&
            secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure Android toolchain
        run: |
          ANDROID_NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n1)"
          test -n "$ANDROID_NDK_DIR"
          ANDROID_LLVM_BIN="$ANDROID_NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_DIR" >> "$GITHUB_ENV"
          echo "$ANDROID_LLVM_BIN" >> "$GITHUB_PATH"
          echo "CC_aarch64_linux_android=$ANDROID_LLVM_BIN/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ANDROID_LLVM_BIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_LLVM_BIN/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Dioxus CLI
        uses: ./.github/actions/setup-dioxus-cli
        with:
          version: ${{ env.DIOXUS_CLI_VERSION }}

      - name: Prefetch Gradle distribution
        run: |
          mkdir -p "$HOME/.gradle/wrapper/dists/gradle-9.1.0-bin/9agqghryom9wkf8r80qlhnts3"
          curl -L --fail --retry 3 --retry-delay 2 \
            -o "$HOME/.gradle/wrapper/dists/gradle-9.1.0-bin/9agqghryom9wkf8r80qlhnts3/gradle-9.1.0-bin.zip" \
            https://services.gradle.org/distributions/gradle-9.1.0-bin.zip

      - name: Build Android debug APK
        run: |
          rm -rf target/dx/rssr-app/release/android
          dx bundle --platform android --package rssr-app --target aarch64-linux-android --release --debug-symbols false
          python3 scripts/prepare_android_bundle.py target/dx/rssr-app/release/android/app/app/src/main
          cd target/dx/rssr-app/release/android/app
          ./gradlew assembleDebug --no-daemon --console=plain
          cd -

      - name: Validate Android debug APK branding
        run: |
          APK_PATH="$(find target/dx/rssr-app/release/android -path '*outputs/apk/debug/*.apk' | head -n1)"
          test -n "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$APK_PATH" | grep "application-label:'RSS-Reader'"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$APK_PATH" | grep 'application-icon-.*rssr_launcher'

      - name: Prepare Android release signing
        if: env.ANDROID_RELEASE_READY == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd target/dx/rssr-app/release/android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          cat <<'EOF' >> app/build.gradle.kts

          android {
              signingConfigs {
                  create("release") {
                      storeFile = rootProject.file("release-keystore.jks")
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF

      - name: Build Android release APK and AAB
        if: env.ANDROID_RELEASE_READY == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd target/dx/rssr-app/release/android/app
          ./gradlew assembleRelease bundleRelease --no-daemon --console=plain

      - name: Validate Android release branding
        if: env.ANDROID_RELEASE_READY == 'true'
        run: |
          RELEASE_APK_PATH="$(find target/dx/rssr-app/release/android -path '*outputs/apk/release/*.apk' | head -n1)"
          RELEASE_AAB_PATH="$(find target/dx/rssr-app/release/android -path '*outputs/bundle/release/*.aab' | head -n1)"
          test -n "$RELEASE_APK_PATH"
          test -n "$RELEASE_AAB_PATH"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$RELEASE_APK_PATH" | grep "application-label:'RSS-Reader'"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$RELEASE_APK_PATH" | grep 'application-icon-.*rssr_launcher'
          unzip -l "$RELEASE_AAB_PATH" | grep 'rssr_launcher'

      - name: Archive Android artifacts
        run: |
          mkdir -p release-assets
          cp target/dx/rssr-app/release/android/app/app/build/outputs/apk/debug/app-debug.apk \
             release-assets/RSS-Reader-android-arm64-v8a-debug.apk
          if [ "$ANDROID_RELEASE_READY" = "true" ]; then
            cp target/dx/rssr-app/release/android/app/app/build/outputs/apk/release/app-release.apk \
              release-assets/RSS-Reader-android-arm64-v8a-release.apk
            cp target/dx/rssr-app/release/android/app/app/build/outputs/bundle/release/app-release.aab \
              release-assets/RSS-Reader-android-arm64-v8a-release.aab
          fi

      - name: Smoke-check archived Android artifacts
        run: |
          test -f release-assets/RSS-Reader-android-arm64-v8a-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging release-assets/RSS-Reader-android-arm64-v8a-debug.apk | grep "application-label:'RSS-Reader'"
          if [ "$ANDROID_RELEASE_READY" = "true" ]; then
            test -f release-assets/RSS-Reader-android-arm64-v8a-release.apk
            test -f release-assets/RSS-Reader-android-arm64-v8a-release.aab
            unzip -l release-assets/RSS-Reader-android-arm64-v8a-release.aab | grep 'rssr_launcher'
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-assets/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Windows binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          New-Item -ItemType Directory -Force staging/RSS-Reader | Out-Null
          Copy-Item target/release/rssr-app.exe staging/RSS-Reader/RSS-Reader.exe
          Compress-Archive -Path staging/RSS-Reader/* -DestinationPath release-assets/RSS-Reader-windows-x86_64.zip
          Compress-Archive -Path target/release/rssr-cli.exe -DestinationPath release-assets/rssr-cli-windows-x86_64.zip

      - name: Smoke-check Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force verify/app | Out-Null
          New-Item -ItemType Directory -Force verify/cli | Out-Null
          Expand-Archive -Path release-assets/RSS-Reader-windows-x86_64.zip -DestinationPath verify/app -Force
          Expand-Archive -Path release-assets/rssr-cli-windows-x86_64.zip -DestinationPath verify/cli -Force
          if (-not (Test-Path verify/app/RSS-Reader.exe)) { throw "missing RSS-Reader.exe in Windows app archive" }
          if (-not (Test-Path verify/cli/rssr-cli.exe)) { throw "missing rssr-cli.exe in Windows CLI archive" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Linux binaries
        run: |
          mkdir -p release-assets
          mkdir -p staging/RSS-Reader
          cp target/release/rssr-app staging/RSS-Reader/RSS-Reader
          tar -C staging/RSS-Reader -czf release-assets/RSS-Reader-linux-x86_64.tar.gz RSS-Reader
          tar -C target/release -czf release-assets/rssr-cli-linux-x86_64.tar.gz rssr-cli

      - name: Smoke-check Linux artifacts
        run: |
          tar -tzf release-assets/RSS-Reader-linux-x86_64.tar.gz | grep '^RSS-Reader$'
          tar -tzf release-assets/rssr-cli-linux-x86_64.tar.gz | grep '^rssr-cli$'

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/*

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Dioxus CLI
        uses: ./.github/actions/setup-dioxus-cli
        with:
          version: ${{ env.DIOXUS_CLI_VERSION }}

      - name: Build web bundle
        run: dx bundle --platform web --package rssr-app --release --debug-symbols false --out-dir target/web-dist

      - name: Archive web bundle
        run: |
          mkdir -p release-assets
          tar -C target/web-dist -czf release-assets/RSS-Reader-web.tar.gz public

      - name: Smoke-check web artifact
        run: |
          tar -tzf release-assets/RSS-Reader-web.tar.gz | grep '^public/index.html$'
          tar -tzf release-assets/RSS-Reader-web.tar.gz | grep '^public/wasm/rssr-app_bg.wasm$'

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: release-assets/*

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Dioxus CLI
        uses: ./.github/actions/setup-dioxus-cli
        with:
          version: ${{ env.DIOXUS_CLI_VERSION }}

      - name: Normalize macOS bundle icon paths
        run: |
          python3 - <<'PY'
          from pathlib import Path
          workspace = Path.cwd()
          config = workspace / "Dioxus.toml"
          text = config.read_text(encoding="utf-8")
          text = text.replace('icon = ["icons/icon.png", "icons/icon.ico", "icons/icon.icns"]', f'icon = ["{workspace / "icons" / "icon.png"}", "{workspace / "icons" / "icon.ico"}", "{workspace / "icons" / "icon.icns"}"]')
          text = text.replace('icon_path = "icons/icon.ico"', f'icon_path = "{workspace / "icons" / "icon.ico"}"')
          config.write_text(text, encoding="utf-8")
          PY

      - name: Build macOS app bundle and CLI
        run: |
          rm -rf target/macos-bundle/${{ matrix.suffix }}
          dx bundle --platform desktop --package-types macos --package rssr-app --target ${{ matrix.target }} --release --out-dir target/macos-bundle/${{ matrix.suffix }}
          cargo build --release --target ${{ matrix.target }} -p rssr-cli

      - name: Archive macOS artifacts
        run: |
          mkdir -p release-assets
          APP_BUNDLE_PATH="$(find target/macos-bundle/${{ matrix.suffix }} -maxdepth 1 -name 'RSS-Reader.app' | head -n1)"
          test -n "$APP_BUNDLE_PATH"
          tar -C "$(dirname "$APP_BUNDLE_PATH")" -czf release-assets/RSS-Reader-${{ matrix.suffix }}.tar.gz RSS-Reader.app
          tar -C target/${{ matrix.target }}/release -czf release-assets/rssr-cli-${{ matrix.suffix }}.tar.gz rssr-cli

      - name: Smoke-check macOS artifacts
        run: |
          tar -tzf release-assets/RSS-Reader-${{ matrix.suffix }}.tar.gz | grep '^RSS-Reader.app/Contents/Info.plist$'
          tar -tzf release-assets/rssr-cli-${{ matrix.suffix }}.tar.gz | grep '^rssr-cli$'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-macos
      - build-web
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            release-assets/**/*.aab
            release-assets/**/*.apk
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
