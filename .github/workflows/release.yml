name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
      ANDROID_RELEASE_READY: >-
        ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' &&
            secrets.ANDROID_KEYSTORE_PASSWORD != '' &&
            secrets.ANDROID_KEY_ALIAS != '' &&
            secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure Android toolchain
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
          echo "CC_aarch64_linux_android=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.3 --locked

      - name: Prefetch Gradle distribution
        run: |
          mkdir -p "$HOME/.gradle/wrapper/dists/gradle-9.1.0-bin/9agqghryom9wkf8r80qlhnts3"
          curl -L --fail --retry 3 --retry-delay 2 \
            -o "$HOME/.gradle/wrapper/dists/gradle-9.1.0-bin/9agqghryom9wkf8r80qlhnts3/gradle-9.1.0-bin.zip" \
            https://services.gradle.org/distributions/gradle-9.1.0-bin.zip

      - name: Build Android debug APK
        run: |
          dx bundle --platform android --package rssr-app --release --debug-symbols false

      - name: Prepare Android release signing
        if: env.ANDROID_RELEASE_READY == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd target/dx/rssr-app/release/android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          cat <<'EOF' >> app/build.gradle.kts

          android {
              signingConfigs {
                  create("release") {
                      storeFile = rootProject.file("release-keystore.jks")
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF

      - name: Build Android release APK and AAB
        if: env.ANDROID_RELEASE_READY == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd target/dx/rssr-app/release/android/app
          ./gradlew assembleRelease bundleRelease --no-daemon --console=plain

      - name: Archive Android artifacts
        run: |
          mkdir -p release-assets
          cp target/dx/rssr-app/release/android/app/app/build/outputs/apk/debug/app-debug.apk \
             release-assets/rssr-app-android-debug.apk
          if [ "$ANDROID_RELEASE_READY" = "true" ]; then
            cp target/dx/rssr-app/release/android/app/app/build/outputs/apk/release/app-release.apk \
              release-assets/rssr-app-android-release.apk
            cp target/dx/rssr-app/release/android/app/app/build/outputs/bundle/release/app-release.aab \
              release-assets/rssr-app-android-release.aab
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-assets/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Windows binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path target/release/rssr-app.exe -DestinationPath release-assets/rssr-app-windows-x86_64.zip
          Compress-Archive -Path target/release/rssr-cli.exe -DestinationPath release-assets/rssr-cli-windows-x86_64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binaries
        run: |
          cargo build --release -p rssr-app
          cargo build --release -p rssr-cli

      - name: Archive Linux binaries
        run: |
          mkdir -p release-assets
          tar -C target/release -czf release-assets/rssr-app-linux-x86_64.tar.gz rssr-app
          tar -C target/release -czf release-assets/rssr-cli-linux-x86_64.tar.gz rssr-cli

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/*

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.3 --locked

      - name: Build web bundle
        run: dx bundle --platform web --package rssr-app --release --debug-symbols false --out-dir target/web-dist

      - name: Archive web bundle
        run: |
          mkdir -p release-assets
          tar -C target/web-dist -czf release-assets/rssr-app-web.tar.gz public

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: release-assets/*

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build macOS binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p rssr-app
          cargo build --release --target ${{ matrix.target }} -p rssr-cli

      - name: Archive macOS binaries
        run: |
          mkdir -p release-assets
          tar -C target/${{ matrix.target }}/release -czf release-assets/rssr-app-${{ matrix.suffix }}.tar.gz rssr-app
          tar -C target/${{ matrix.target }}/release -czf release-assets/rssr-cli-${{ matrix.suffix }}.tar.gz rssr-cli

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-macos
      - build-web
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.aab
            release-assets/**/*.apk
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
