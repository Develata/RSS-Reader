name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-image:
    runs-on: ubuntu-latest
    env:
      SMOKE_IMAGE: rss-reader-smoke:${{ github.sha }}
      SHOULD_PUSH_IMAGE: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner
        with:
          prune-docker: "true"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: env.SHOULD_PUSH_IMAGE == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/develata/rss-reader
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.SMOKE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container runtime
        run: |
          set -euo pipefail
          CONTAINER_NAME="rss-reader-smoke"
          cleanup() {
            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 18080:8080 \
            -e RSS_READER_WEB_USERNAME=smoke \
            -e RSS_READER_WEB_PASSWORD=smoke-pass \
            -e RSS_READER_WEB_ENV=development \
            -e RSS_READER_WEB_SECURE_COOKIE=false \
            "$SMOKE_IMAGE"

          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "container health check failed" >&2
          docker logs "$CONTAINER_NAME" || true
          exit 1

      - name: Build and push image
        if: env.SHOULD_PUSH_IMAGE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip image push on non-tag refs
        if: env.SHOULD_PUSH_IMAGE != 'true'
        run: |
          echo "Docker image push is disabled for ${GITHUB_REF}."
          echo "This workflow only publishes images for version tags (refs/tags/v*)."
