name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WASM_BINDGEN_CLI_VERSION: 0.2.114

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace tests
        run: cargo test --workspace

      - name: CLI smoke
        run: cargo run -p rssr-cli -- --help

  web-smoke:
    runs-on: ubuntu-latest
    env:
      DIOXUS_CLI_VERSION: 0.7.3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Dioxus CLI
        uses: ./.github/actions/setup-dioxus-cli
        with:
          version: ${{ env.DIOXUS_CLI_VERSION }}

      - name: Wasm target check
        run: cargo check -p rssr-app --target wasm32-unknown-unknown

      - name: Web bundle smoke
        run: dx bundle --platform web --package rssr-app --release --debug-symbols false --out-dir target/web-dist

  wasm-browser-contract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        harness:
          - wasm_refresh_contract_harness
          - wasm_subscription_contract_harness
          - wasm_config_exchange_contract_harness
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3 unzip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen test runner
        run: cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_CLI_VERSION}" --locked

      - name: Setup Chrome for Testing
        run: bash scripts/setup_chrome_for_testing.sh

      - name: Run wasm browser contract harness
        run: bash scripts/run_wasm_contract_harness.sh "${{ matrix.harness }}"

  android-smoke:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
      ANDROID_API_LEVEL: 34
      DIOXUS_CLI_VERSION: 0.7.3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-github-runner

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure Android toolchain
        run: |
          ANDROID_NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n1)"
          test -n "$ANDROID_NDK_DIR"
          ANDROID_LLVM_BIN="$ANDROID_NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_DIR" >> "$GITHUB_ENV"
          echo "$ANDROID_LLVM_BIN" >> "$GITHUB_PATH"
          echo "CC_aarch64_linux_android=$ANDROID_LLVM_BIN/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ANDROID_LLVM_BIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_LLVM_BIN/aarch64-linux-android${ANDROID_API_LEVEL}-clang" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Dioxus CLI
        uses: ./.github/actions/setup-dioxus-cli
        with:
          version: ${{ env.DIOXUS_CLI_VERSION }}

      - name: Android target smoke check
        run: cargo check -p rssr-app --target aarch64-linux-android

      - name: Android bundle smoke
        run: |
          rm -rf target/dx/rssr-app/release/android
          dx bundle --platform android --package rssr-app --target aarch64-linux-android --release --debug-symbols false
          python3 scripts/prepare_android_bundle.py target/dx/rssr-app/release/android/app/app/src/main
          cd target/dx/rssr-app/release/android/app
          ./gradlew assembleDebug --no-daemon --console=plain
          cd -
          APK_PATH="$(find target/dx/rssr-app/release/android -path '*outputs/apk/debug/*.apk' | head -n1)"
          test -n "$APK_PATH"
          unzip -l "$APK_PATH" | grep 'lib/arm64-v8a/libdioxusmain.so'
          ! unzip -l "$APK_PATH" | grep 'lib/x86_64/libdioxusmain.so'
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$APK_PATH" | grep "application-label:'RSS-Reader'"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" dump badging "$APK_PATH" | grep 'application-icon-.*rssr_launcher'
