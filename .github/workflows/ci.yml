name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.3 --locked

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace tests
        run: cargo test --workspace

      - name: Wasm target check
        run: cargo check -p rssr-app --target wasm32-unknown-unknown

      - name: CLI smoke
        run: cargo run -p rssr-cli -- --help

      - name: Web bundle smoke
        run: dx bundle --platform web --package rssr-app --release --debug-symbols false --out-dir target/web-dist
